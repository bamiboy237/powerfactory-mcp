name: Windows installer

on:
  push:
    paths:
      - "scripts/*.ps1"
      - "tests/windows/*.ps1"
      - ".github/workflows/windows-installer.yml"
  pull_request:
    paths:
      - "scripts/*.ps1"
      - "tests/windows/*.ps1"
      - ".github/workflows/windows-installer.yml"

jobs:
  powershell-51:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Parse every PowerShell release artifact
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $files = Get-ChildItem scripts, tests/windows -Filter *.ps1 -File -Recurse
          $failures = @()
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            foreach ($errorRecord in @($errors)) {
              $failures += "$($file.FullName):$($errorRecord.Extent.StartLineNumber): $($errorRecord.Message)"
            }
          }
          if ($failures.Count -gt 0) {
            throw ($failures -join [Environment]::NewLine)
          }

      - name: Install Pester 5
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run transactional installer tests
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Import-Module Pester -RequiredVersion 5.7.1
          $config = New-PesterConfiguration
          $config.Run.Path = "tests/windows/InstallWindows.Transaction.Tests.ps1"
          $config.Run.PassThru = $true
          $config.Output.Verbosity = "Detailed"
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = "NUnitXml"
          $config.TestResult.OutputPath = "pester-results.xml"
          $result = Invoke-Pester -Configuration $config
          if ($result.FailedCount -gt 0) { exit 1 }

      - name: Upload Pester results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-pester-results
          path: pester-results.xml
          if-no-files-found: warn
